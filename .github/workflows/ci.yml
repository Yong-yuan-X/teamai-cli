name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test (Node ${{ matrix.node-version }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  build:
    name: Build
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  e2e:
    name: E2E (GitHub provider)
    needs: build
    runs-on: ubuntu-latest
    # E2E tests require live repo access — skip if secrets are not configured
    # (e.g. PRs from forks, or forks of this repo without the secrets set).
    if: ${{ vars.TEAMAI_TEST_REPO_URL != '' }}
    env:
      TEAMAI_TEST_PROVIDER: github
      TEAMAI_TEST_REPO_URL: ${{ vars.TEAMAI_TEST_REPO_URL }}
      TEAMAI_TEST_TOKEN: ${{ secrets.TEAMAI_TEST_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Prepare teamai config
        run: |
          set -e
          mkdir -p "$HOME/.teamai"
          REPO_LOCAL="$HOME/.teamai/team-repo"
          case "$TEAMAI_TEST_REPO_URL" in
            http://*|https://*) CLONE_URL="$TEAMAI_TEST_REPO_URL" ;;
            *) CLONE_URL="https://github.com/${TEAMAI_TEST_REPO_URL}.git" ;;
          esac
          AUTH_URL="${CLONE_URL/https:\/\//https:\/\/x-access-token:${TEAMAI_TEST_TOKEN}@}"
          git clone "$AUTH_URL" "$REPO_LOCAL"
          cat > "$HOME/.teamai/config.yaml" <<EOF
          repo:
            localPath: "$REPO_LOCAL"
            remote: "$TEAMAI_TEST_REPO_URL"
          username: ci
          EOF

      - name: Run E2E
        run: npx vitest run --config vitest.e2e.config.ts
